version: '2.2'

services:

  redis:
    image: redis:alpine
    container_name: mailu-redis
    networks:
      - mail
    restart: always
    volumes:
      - "./mailu/redis:/data"

  front:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}nginx:${MAILU_VERSION:-2.0}
    container_name: mailu-front
    restart: always
    env_file: mailu.env
    logging:
      driver: journald
      options:
        tag: mailu-front
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "110:110"
      - "995:995"
      - "143:143"
      - "993:993"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mail.entrypoints=http
      - traefik.http.routers.mail.rule=Host(`mail.tbz.domain.tld`)
      - traefik.http.middlewares.mail-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.mail.middlewares=mail-https-redirect
      - traefik.http.routers.mail-secure.entrypoints=https
      - traefik.http.routers.mail-secure.rule=Host(`mail.tbz.domain.tld`)
      - traefik.http.routers.mail-secure.tls=true
      - traefik.http.routers.mail-secure.service=mail
      - traefik.http.services.mail.loadbalancer.server.port=80
      - traefik.docker.network=proxy
    networks:
      proxy:
        ipv4_address: 172.16.2.1
      mail:
    volumes:
      - "./mailu/certs:/certs"
      - "./mailu/overrides/nginx:/overrides:ro"

  admin:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}admin:${MAILU_VERSION:-2.0}
    container_name: mailu-admin
    restart: always
    env_file: mailu.env
    networks:
      - mail
    logging:
      driver: journald
      options:
        tag: mailu-admin
    volumes:
      - "./mailu/data:/data"
      - "./mailu/dkim:/dkim"
    depends_on:
      - redis

  imap:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}dovecot:${MAILU_VERSION:-2.0}
    container_name: mailu-imap
    restart: always
    env_file: mailu.env
    networks:
      - mail
    logging:
      driver: journald
      options:
        tag: mailu-imap
    volumes:
      - "./mailu/mail:/mail"
      - "./mailu/overrides/dovecot:/overrides:ro"
    depends_on:
      - front

  smtp:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}postfix:${MAILU_VERSION:-2.0}
    container_name: mailu-smtp
    restart: always
    env_file: mailu.env
    networks:
      - mail
    logging:
      driver: journald
      options:
        tag: mailu-smtp
    volumes:
      - "./mailu/mailqueue:/queue"
      - "./mailu/overrides/postfix:/overrides:ro"
    depends_on:
      - front

  antispam:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}rspamd:${MAILU_VERSION:-2.0}
    container_name: mailu-antispam
    hostname: antispam
    restart: always
    env_file: mailu.env
    networks:
      - mail
    logging:
      driver: journald
      options:
        tag: mailu-antispam
    volumes:
      - "./mailu/filter:/var/lib/rspamd"
      - "./mailu/overrides/rspamd:/overrides:ro"
    depends_on:
      - front
      - redis

  webmail:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}webmail:${MAILU_VERSION:-2.0}
    container_name: mailu-webmail
    restart: always
    env_file: mailu.env
    volumes:
      - "./mailu/webmail:/data"
      - "./mailu/overrides/roundcube:/overrides:ro"
    networks:
      - proxy
    depends_on:
      - front

networks:
  mail:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/16
  proxy:
    external: true
