version: "3"

services:

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      proxy:
        ipv4_address: 172.16.0.2
    ports:
      - 80:80
      - 443:443
    environment:
      - CF_API_EMAIL=sulejmaniarlind5@gmail.com
      - CF_DNS_API_TOKEN=REDACTED_CF_DNS_API_TOKEN
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data-proxy/traefik.yml:/traefik.yml:ro
      - ./data-proxy/traefik.yml:/config.yml:ro
      - ./data-proxy/acme.json:/acme.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.entrypoints=http"
      - "traefik.http.routers.traefik.rule=Host(`traefik.tbz.domain.tld`)"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=arlind:$$apr1$$J9aFUVEo$$ClVOvCnSmf.tisyo8Lj1W/"
      - "traefik.http.middlewares.traefik-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.traefik.middlewares=traefik-https-redirect"
      - "traefik.http.routers.traefik-secure.entrypoints=https"
      - "traefik.http.routers.traefik-secure.rule=Host(`traefik.tbz.domain.tld`)"
      - "traefik.http.routers.traefik-secure.middlewares=traefik-auth"
      - "traefik.http.routers.traefik-secure.tls=true"
      - "traefik.http.routers.traefik-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-secure.tls.domains[0].main=tbz.domain.tld"
      - "traefik.http.routers.traefik-secure.tls.domains[0].sans=*.tbz.domain.tld"
      - "traefik.http.routers.traefik-secure.service=api@internal"

networks:
  proxy:
    external: true
